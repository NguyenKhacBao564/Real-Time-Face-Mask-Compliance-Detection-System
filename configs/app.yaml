app:
  name: Real-Time Face Mask Compliance Detection System
  host: 0.0.0.0
  port: 8000

model:
  path: models/best.pt
  image_size: 640
  confidence_threshold: 0.35
  iou_threshold: 0.45

classes:
  0: correct_mask
  1: incorrect_mask
  2: no_mask

runtime:
  save_violation_snapshots: true
  snapshot_dir: outputs/snapshots
  websocket_debug_annotated_frame: false

# Event logging for AI-camera-style violation review.
# All values can be overridden by environment variables (see .env.example).
events:
  enabled: true                  # EVENT_LOG_ENABLED
  confidence_threshold: 0.6      # EVENT_CONFIDENCE_THRESHOLD
  snapshot_enabled: true         # EVENT_SNAPSHOT_ENABLED
  snapshot_cooldown_seconds: 3   # EVENT_SNAPSHOT_COOLDOWN_SECONDS
  output_dir: outputs/events     # EVENT_OUTPUT_DIR (events.jsonl + snapshots/)

