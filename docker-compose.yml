services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_CONFIG: configs/app.yaml
      MODEL_PATH: models/best.pt
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
